<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDK — Стриминговый сервис</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* ШАПКА */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 50px;
            background: #0f0f0f; display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; z-index: 100; border-bottom: 1px solid #1a1a1a;
        }
        .header img.logo { height: 25px; border-radius: 4px; }
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-menu img { 
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; 
            border: 2px solid #222; transition: 0.2s; background: #1a1a1a;
        }
        .user-menu img:hover { border-color: #fff; }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 240px; background: #0e0e0e; padding-top: 60px;
            display: flex; flex-direction: column; border-right: 1px solid #1a1a1a;
        }
        .sidebar-title { font-size: 11px; font-weight: bold; padding: 10px 20px; color: #efeff1; text-transform: uppercase; }
        .followed-user {
            display: flex; align-items: center; padding: 10px 20px; cursor: pointer; transition: 0.2s;
        }
        .followed-user:hover { background: #1f1f23; }
        .followed-user img { width: 30px; height: 30px; border-radius: 50%; margin-right: 12px; background: #333; }
        .user-info { flex-grow: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-dot { width: 8px; height: 8px; background: #eb0400; border-radius: 50%; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content { flex-grow: 1; padding: 70px 30px 30px 30px; overflow-y: auto; background: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        /* КАРТОЧКА СТРИМА */
        .card { cursor: pointer; transition: 0.2s; }
        .thumbnail { 
            width: 100%; aspect-ratio: 16/9; background: #18181b; 
            position: relative; border-radius: 4px; border: 1px solid #1a1a1a;
        }
        .live-tag { position: absolute; top: 10px; left: 10px; background: #eb0400; color: #fff; padding: 2px 6px; font-size: 12px; font-weight: bold; border-radius: 4px; }
        .card-info { padding: 12px 0; display: flex; gap: 12px; }
        .card-info img { width: 40px; height: 40px; border-radius: 50%; background: #333; }
        .stream-text h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; color: #efeff1; }
        .stream-text p { font-size: 13px; color: #adadb8; }
    </style>
</head>
<body>

    <div class="header">
        <img src="idk_logo.png" class="logo" alt="IDK">
        <div class="user-menu">
            <a href="/profile">
                <img id="userAvatar" src="https://via.placeholder.com/150" alt="Профиль">
            </a>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">ОТ СЕРВИСА</div>
        <div id="followedList">
            <div class="followed-user">
                <img src="idk_logo.png" alt="IDK">
                <div class="user-info">IDK_Official</div>
                <div class="status-dot"></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h2 style="margin-bottom: 25px; font-size: 18px;">Рекомендованные трансляции</h2>
        <div class="grid" id="streamsGrid">
            
            <div class="card">
                <div class="thumbnail">
                    <div class="live-tag">LIVE</div>
                </div>
                <div class="card-info">
                    <img src="https://via.placeholder.com/50" alt="Avatar">
                    <div class="stream-text">
                        <h4>Тестовый стрим платформы</h4>
                        <p>IDK_User</p>
                        <p style="color: #666;">Общение</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const supabaseUrl = 'https://oogxduktdzweqvbfxeiz.supabase.co';
        const supabaseKey = 'sb_publishable_g8o9XJ0Emk0bWQZD3C4h2A_FH-JVd_M';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 1. ЗАЩИТА: Проверяем, залогинен ли юзер
        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();

            if (!session) {
                // Если не зареган — кидаем на страницу приветствия
                window.location.href = 'register.html';
            } else {
                // Если зареган — грузим профиль
                loadUserData(session.user);
            }
        }

        // 2. ЗАГРУЗКА ДАННЫХ: Аватарка из таблицы profiles
        async function loadUserData(user) {
            let { data: profile } = await _supabase
                .from('profiles')
                .select('avatar_url, username')
                .eq('id', user.id)
                .single();

            if (profile && profile.avatar_url) {
                document.getElementById('userAvatar').src = profile.avatar_url;
            }
        }

        checkAuth();
    </script>
</body>
</html>
